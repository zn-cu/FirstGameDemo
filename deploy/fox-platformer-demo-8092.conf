server
{
    listen 8092;
    listen [::]:8092;
    server_name 49.232.174.53;
    root /www/wwwroot/fox-platformer-demo;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wav|mp3|ogg|ttf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md|package\.json|composer\.json) {
        return 404;
    }

    access_log /www/wwwlogs/fox-platformer-demo-8092.log;
    error_log /www/wwwlogs/fox-platformer-demo-8092.error.log;
}
